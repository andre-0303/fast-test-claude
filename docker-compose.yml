services:
  backend:
    build: ./backend
    container_name: fast-tests-backend
    command: npm run dev
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/data:/app/data
    depends_on:
      - postgres
    env_file:
      - .env
    networks:
      - fast-tests-network

  frontend:
    build: ./frontend
    container_name: fast-tests-frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - backend
    networks:
      - fast-tests-network

  postgres:
    image: postgres:16-alpine
    container_name: fast-tests-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fasttest}
      POSTGRES_USER: ${POSTGRES_USER:-fasttest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fasttest123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    networks:
      - fast-tests-network

networks:
  fast-tests-network:
    driver: bridge

volumes:
  postgres_data: